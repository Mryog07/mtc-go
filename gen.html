<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MTC Link Generator</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { background-color: #070B14; color: #ffffff; font-family: 'Inter', sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 20px; }
        .container { width: 100%; max-width: 450px; text-align: center; }
        .icon { width: 80px; height: 80px; border: 2px solid #00F0FF; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 20px auto; box-shadow: 0 0 20px rgba(0,240,255,0.3); }
        h1 { font-size: 20px; font-weight: 800; }
        .gen-text { color: #00F0FF; font-size: 24px; font-weight: 800; margin-bottom: 5px; }
        input { width: 100%; padding: 15px; border-radius: 8px; border: 1px solid #333; background: #0B101A; color: white; margin-bottom: 20px; }
        button { width: 100%; padding: 15px; border-radius: 8px; border: none; background: linear-gradient(90deg, #6e45e2, #88d3ce); color: white; font-weight: bold; cursor: pointer; margin-bottom: 20px; }
        #result-box { width: 100%; padding: 15px; border-radius: 8px; border: 1px dashed #00F0FF; background: #0B101A; color: #00F0FF; font-size: 12px; margin-bottom: 10px; display: none; word-break: break-all; }
        .copy-btn { width: 100%; padding: 15px; border-radius: 8px; border: none; background: #1f2937; color: white; font-weight: bold; display: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="icon">⚙️</div>
    <h1>MTC LINK</h1>
    <div class="gen-text">GENERATOR</div>
    <p style="color:#7a8295; font-size: 12px; margin-bottom: 30px;">Secure Link Creation System Active</p>
    
    <input type="text" id="link" placeholder="Paste your link here...">
    <button onclick="generate()">ENCRYPT & GENERATE</button>
    
    <div id="result-box"></div>
    <button class="copy-btn" id="copy-btn" onclick="copyLink()">COPY SECURE LINK</button>
</div>

<script>
    function generate() {
        let link = document.getElementById('link').value;
        if(!link) return;
        let id = link.split('/').pop();
        let secureLink = "https://mtc-go.vercel.app/?v=" + id;
        
        let resBox = document.getElementById('result-box');
        resBox.innerText = secureLink;
        resBox.style.display = 'block';
        document.getElementById('copy-btn').style.display = 'block';
    }
    
    function copyLink() {
        let text = document.getElementById('result-box').innerText;
        navigator.clipboard.writeText(text);
        alert("Link Copied!");
    }
</script>
</body>
</html>
